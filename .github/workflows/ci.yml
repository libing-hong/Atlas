name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - "stabilization/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test planning
        run: npm run test:planning

      - name: Test recommendations
        run: npm run test:recommendation

      - name: Production build
        run: npm run build

      - name: Start application
        run: npm run start > /tmp/atlas-next.log 2>&1 &

      - name: Smoke test routes
        run: npm run test:smoke

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-next-server-log
          path: /tmp/atlas-next.log
          retention-days: 7

